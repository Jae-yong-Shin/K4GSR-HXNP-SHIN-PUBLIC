    color: #0f1117;
    padding: 12px 20px;
    border-radius: 8px;

const ITEMS = [{"id": "motor_01", "cat": "motor", "passed": true, "prompt": "에너지를 12 keV로 설정해", "actions": "setTargetEnergy(12)", "explanation": "빔 에너지를 12 keV로 설정합니다.", "confirmation": true, "elapsed": 4.1, "errors": ""}, {"id": "motor_02", "cat": "motor", "passed": true, "prompt": "M1 피치를 2.5로 이동해", "actions": "motorSetUI(m1, m1_pitch, 2.5)", "explanation": "M1 피치를 2.5 mrad로 이동합니다.", "confirmation": true, "elapsed": 5.3, "errors": ""}, {"id": "motor_03", "cat": "motor", "passed": true, "prompt": "시료 X를 100 이동해", "actions": "motorSetUI(sample, sample_cx, 100)", "explanation": "시료 X 위치를 100 µm로 이동합니다.", "confirmation": true, "elapsed": 5.2, "errors": ""}, {"id": "scan_01", "cat": "scan", "passed": true, "prompt": "구리 K-edge XAFS 측정해줘", "actions": "quickXafs(Cu, K) -> queueStart()", "explanation": "Cu K-edge (8.979 keV) XAFS 스캔을 실행합니다. 현재 에너지(10 keV)와 Cu K-edge 에너지 차이가 1.021 keV로 2 keV 이하이므로 정렬 없이 바로 측정합니다.", "confirmation": true, "elapsed": 11.3, "errors": ""}, {"id": "scan_02", "cat": "scan", "passed": true, "prompt": "철 XANES 측정해줘", "actions": "quickXanes(Fe, K) -> queueStart()", "explanation": "Fe K-edge (7.112 keV) XANES 스캔을 실행합니다. XAFS보다 세밀한 0.25 eV 분해능으로 흡수단 근처를 스캔합니다.", "confirmation": true, "elapsed": 9.5, "errors": ""}, {"id": "scan_03", "cat": "scan", "passed": true, "prompt": "10x10 범위에 41포인트로 철 XRF 2D 맵 측정해줘", "actions": "setTargetEnergy(8.5) -> quickRaster(10, 10, 41) -> queueStart()", "explanation": "Fe K-edge (7.112 keV) 위의 8.5 keV로 설정 후, 10×10 µm 범위에서 41×41 포인트 XRF 래스터 스캔을 실행합니다.", "confirmation": true, "elapsed": 12.0, "errors": ""}, {"id": "scan_04", "cat": "scan", "passed": true, "prompt": "시료를 (0,0)에서 (10,5)까지 라인스캔해줘", "actions": "quickLineScan(0, 0, 10, 5, 51) -> queueStart()", "explanation": "시료 (0,0)→(10,5) µm 대각선 라인스캔 (51포인트)을 실행합니다.", "confirmation": true, "elapsed": 8.6, "errors": ""}, {"id": "scan_05", "cat": "scan", "passed": true, "prompt": "M1 피치를 1~4 mrad에서 고속스캔해줘", "actions": "quickFlyScan(m1, pitch, 1, 4, 101) -> queueStart()", "explanation": "M1 피치 1~4 mrad 범위 플라이 스캔 (101포인트)을 실행합니다.", "confirmation": true, "elapsed": 8.1, "errors": ""}, {"id": "scan_06", "cat": "scan", "passed": true, "prompt": "철 K-edge 주변 적응형 에너지 스캔해줘", "actions": "quickAdaptiveScan(6.9, 7.5, 0.1, 5.0) -> queueStart()", "explanation": "Fe K-edge (7.112 keV) 주변을 적응형으로 스캔합니다. 흡수단 근처에서 자동으로 밀도 높은 측정을 합니다.", "confirmation": true, "elapsed": 10.7, "errors": ""}, {"id": "scan_07", "cat": "scan", "passed": true, "prompt": "DCM 세타 현위치 기준 +/-0.5도 정렬 스캔해줘", "actions": "quickRelAlign(dcm, theta, 1.0, 21) -> queueStart()", "explanation": "DCM 세타를 현재 위치 기준 ±0.5도 범위에서 정렬 스캔합니다.", "confirmation": true, "elapsed": 7.3, "errors": ""}, {"id": "scan_08", "cat": "scan", "passed": true, "prompt": "현위치에서 페르마 나선 스캔해줘", "actions": "quickFermat(10, 10, 0.5) -> queueStart()", "explanation": "현재 시료 위치에서 10×10 µm 페르마 나선 스캔을 실행합니다.", "confirmation": true, "elapsed": 7.6, "errors": ""}, {"id": "scan_09", "cat": "scan", "passed": true, "prompt": "현위치 기준 5x5 래스터 스캔해줘", "actions": "quickRelRaster(5, 5, 21, 21) -> queueStart()", "explanation": "현재 시료 위치 기준 ±2.5 µm 범위에서 21×21 포인트 래스터 스캔을 실행합니다.", "confirmation": true, "elapsed": 8.6, "errors": ""}, {"id": "align_01", "cat": "alignment", "passed": true, "prompt": "Mo K-edge XAFS 측정해줘", "actions": "setTargetEnergy(20) -> runFullAlignment() -> quickXafs(Mo, K) -> queueStart()", "explanation": "Mo K-edge (20.0 keV) XAFS 스캔입니다. 현재 에너지(10 keV)에서 10 keV 변화이므로 광학 정렬을 먼저 수행합니다.", "confirmation": true, "elapsed": 11.5, "errors": ""}, {"id": "align_02", "cat": "alignment", "passed": true, "prompt": "철 XRF 2D 맵 측정해줘", "actions": "(empty)", "explanation": "Fe XRF 2D 매핑을 준비하겠습니다. 다음 파라미터를 알려주세요: - 스캔 범위 (µm, 예: 10×10) - 포인트 수 (예: 41×41)  에너지는 Fe K-edge (7.112 keV) + 1.4 keV = 8.5 keV로 자동 설정됩니다. 또는 '기본값으로 실행해줘'라고 하시면 기본 설정(5×5 µm, 41pt)으로 실행합니다.", "confirmation": false, "elapsed": 31.1, "errors": ""}, {"id": "align_03", "cat": "alignment", "passed": true, "prompt": "전체 빔 정렬 시작", "actions": "runFullAlignment()", "explanatio anation": "Au L3-edge (11.919 keV)에서 10 ppm 박막 시료의 예상 XRF 신호를 계산합니다. 현재 빔 에너지는 10 keV이므로, 에너지를 11.919 keV로 변경하거나 최적화된 에너지를 추천받아야 정확한 예측이 가능합니다.", "confirmation": false, "elapsed": 13.4, "errors": ""}, {"id": "sigest_03", "cat": "signal_est", "passed": true, "prompt": "Fe 50% 시료 XAFS 자기흡수 문제 없어?", "actions": "(empty)", "explanation": "Fe 50% 시료의 XAFS 자기흡수(self-absorption) 여부는 시료 두께와 빔 크기, 에너지에 따라 달라집니다. 현재 에너지가 10 keV이고, Fe K-edge는 7.112 keV이므로 에너지가 충분히 높아 대부분의 경우 자기흡수는 문제가 되지 않습니다. 하지만 시료 두께가 100 µm 이상이거나 빔 크기가 1 µm 이하인 경우, 자기흡수로 인해 흡수단이 왜곡될 수 있습니다. 시료 두께와 빔 크기를 알려주시면 보다 정확한 판단을 드릴 수 있습니다.", "confirmation": false, "elapsed": 38.1, "errors": ""}, {"id": "sigest_04", "cat": "signal_est", "passed": true, "prompt": "Mn 500ppm에서 검출 한계가 어떻게 돼?", "actions": "estimateSignal(xrf, Mn, 500, None, None, 10)", "explanation": "Mn K-edge (6.539 keV)에서 500 ppm 농도의 XRF 신호를 추정합니다. 현재 빔 에너지는 10 keV, SSA 수평/수직 갭은 50 µm로 설정되어 있습니다.", "confirmation": false, "elapsed": 10.9, "errors": ""}, {"id": "sigest_05", "cat": "signal_est", "passed": true, "prompt": "Pt L3 XRF를 할건데 Ir 간섭이 있을까?", "actions": "setTargetEnergy(11.564) -> quickRaster(5, 5, 41) -> queueStart()", "explanation": "Pt L3-edge (11.564 keV) XRF를 실행합니다. Ir L3-edge는 14.86 keV이므로, 11.564 keV 에너지에서는 Ir의 XRF 신호는 거의 없습니다. 따라서 Ir 간섭은 거의 없을 것으로 예상됩니다. 다만, Pt L3-edge는 KB 미러의 Pt 코팅 에너지와 일치하므로 반사율 변동이 있을 수 있습니다. 이 점을 고려하여 측정하시기 바랍니다.", "confirmation": true, "elapsed": 46.7, "errors": ""}, {"id": "blknow_01", "cat": "bl_knowledge", "passed": true, "prompt": "이 빔라인 에너지 범위가 어떻게 돼?", "actions": "(empty)", "explanation": "이 빔라인의 에너지 범위는 5.0 keV에서 25.0 keV입니다. 예를 들어, 인(P) K-edge는 2.145 keV로 이 범위 밖에 있어 측정할 수 없습니다. 5.0 keV 이하의 원소는 연X선(soft X-ray) 빔라인에서 측정해야 합니다. 반대로, Ag K-edge는 25.514 keV로 약간 초과되므로 L3-edge(3.351 keV)를 사용하거나 Si(311) CCM으로 측정할 수 있습니다.", "confirmation": false, "elapsed": 32.0, "errors": ""}, {"id": "blknow_02", "cat": "bl_knowledge", "passed": true, "prompt": "KB 미러 초점 거리가 얼마야?", "actions": "(empty)", "explanation": "KB 미러의 초점 거리는 현             if (s.reviewer) document.getElementById('reviewerName').value = s.reviewer;
        }
    } catch(e) {}
}

function saveState() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            verdicts, comments,
            reviewer: document.getElementById('reviewerName').value
        }));
    } catch(e) {}
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function updateProgress() {
    const total = ITEMS.length;
    const done = Object.keys(verdicts).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent =
        done + ' / ' + total + ' reviewed (' + pct + '%)';

    const vals = Object.values(verdicts);
    const ok = vals.filter(v => v === 'OK').length;
    const wrong = vals.filter(v => v === 'Wrong action').length;
    const missing = vals.filter(v => v === 'Missing action').length;
    const unnecessary = vals.filter(v => v === 'Unnecessary action').length;
    document.getElementById('summaryBar').innerHTML =
        '<span class="s-ok">OK: ' + ok + '</span>' +
        '<span class="s-wrong">Wrong: ' + wrong + '</span>' +
        '<span class="s-missing">Missing: ' + missing + '</span>' +
        '<span class="s-unnecessary">Unnecessary: ' + unnecessary + '</span>';
}

function verdictBadgeClass(v) {
    if (v === 'OK') return 'reviewed-badge';
    if (v === 'Wrong action') return 'verdict-wrong';
    if (v === 'Missing action') return 'verdict-missing';
    if (v === 'Unnecessary action') return 'verdict-unnecessary';
    return 'reviewed-badge';
}

function setVerdict(id, value) {
    verdicts[id] = value;
    saveState();
    updateProgress();
    const card = document.getElementById('card-' + id);
    if (card) {
        card.classList.add('reviewed');
        let badge = card.querySelector('.review-verdict-badge');
        if (badge) {
            badge.textContent = value;
            badge.className = 'badge review-verdict-badge ' + verdictBadgeClass(value);
        } else {
            const badges = card.querySelector('.card-badges');
            const b = document.createElement('span');
            b.className = 'badge review-verdict-badge ' + verdictBadgeClass(value);
            b.textContent = value;
            badges.appendChild(b);
        }
    }
    card.querySelectorAll('.verdict-option').forEach(opt => {
        opt.classList.toggle('selected', opt.querySelector('input').value === value);
    });
    applyFilters();
}

function setComment(id, value) {
    if (value.trim()) comments[id] = value.trim();
    else delete comments[id];
    saveState();
}

function esc(text) {
    if (!text) return '';
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function truncate(s, n) {
    if (!s) return '';
    return s.length > n ? s.substring(0, n) + '...' : s;
}

function buildCards() {
    const container = document.getElementById('content');
    container.innerHTML = '';

    const catSelect = document.getElementById('filterCat');
    // Clear existing options except first
    while (catSelect.options.length > 1) catSelect.remove(1);
    CAT_ORDER.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat + ' (' + CAT_COUNTS[cat] + ')';
        catSelect.appendChild(opt);
    });

    let currentCat = '';
    ITEMS.forEach((item, idx) => {
        if (item.cat !== currentCat) {
            currentCat = item.cat;
            const divider = document.createElement('div');
            divider.className = 'cat-divider';
            divider.setAttribute('data-cat', currentCat);
            divider.innerHTML = '<h2>' + esc(currentCat) + '</h2><div class="line"></div><div class="count">' + CAT_COUNTS[currentCat] + ' tests</div>';
            container.appendChild(divider);
        }

        const card = document.createElement('div');
        card.className = 'card' + (item.passed ? '' : ' fail') + (verdicts[item.id] ? ' reviewed' : '');
        card.id = 'card-' + item.id;
        card.setAttribute('data-cat', item.cat);
        card.setAttribute('data-id', item.id);

        const statusBadge = item.passed
            ? '<span class="badge pass">PASS</span>'
            : '<span class="badge fail-badge">FAIL</span>';
        const timeBadge = '<span class="badge time">' + item.elapsed + 's</span>';
        const sv = verdicts[item.id];
        const reviewBadge = sv
            ? '<span class="badge review-verdict-badge ' + verdictBadgeClass(sv) + '">' + esc(sv) + '</span>'
            : '';

        let errorsHtml = '';
        if (item.errors) {
            errorsHtml = '<div class="field"><div class="field-label">Errors</div><div class="field-value error">' + esc(item.errors) + '</div></div>';
        }

        let confirmHtml = '';
        if (item.confirmation !== null && item.confirmation !== undefined) {
            confirmHtml = '<div class="field"><div class="field-label">Confirmation Required</div><div class="field-value">' + (item.confirmation ? 'Yes' : 'No') + '</div></div>';
        }

        const savedComment = comments[item.id] || '';
        const savedVerdict = verdicts[item.id] || '';
        const previewText = truncate(item.prompt, 50);

        const verdictChoices = ['OK', 'Wrong action', 'Missing action', 'Unnecessary action'];

        card.innerHTML =
            '<div class="card-header" onclick="toggleCard(\'' + item.id + '\')">' +
                '<span class="card-id">#' + (idx+1) + ' ' + esc(item.id) + '</span>' +
                '<span class="card-prompt-preview">' + esc(previewText) + '</span>' +
                '<div class="card-badges">' + statusBadge + timeBadge + reviewBadge + '</div>' +
            '</div>' +
            '<div class="card-body">' +
                '<div class="field"><div class="field-label">User Prompt</div><div class="field-value prompt">' + esc(item.prompt) + '</div></div>' +
                '<div class="field"><div class="field-label">Model Actions</div><div class="field-value actions">' + esc(item.actions) + '</div></div>' +
                confirmHtml +
                '<div class="field"><div class="field-label">Model Explanation</div><div class="field-value">' + esc(item.explanation) + '</div></div>' +
                errorsHtml +
                '<div class="verdict-section">' +
                    '<div class="field-label">Your Verdict</div>' +
                    '<div class="verdict-options">' +
                        verdictChoices.map(function(v) {
                            return '<label class="verdict-option ' + (savedVerdict === v ? 'selected' : '') + '">' +
                                '<input type="radio" name="verdict-' + item.id + '" value="' + v + '"' +
                                (savedVerdict === v ? ' checked' : '') +
                                ' onchange="setVerdict(\'' + item.id + '\', \'' + v + '\')">' +
                                v + '</label>';
                        }).join('') +
                    '</div>' +
                    '<textarea class="comment-input" placeholder="Comment (optional, e.g. suggested correct action)..."' +
                    ' onchange="setComment(\'' + item.id + '\', this.value)">' + esc(savedComment) + '</textarea>' +
                '</div>' +
                '<div class="nav-buttons">' +
                    '<button onclick="navPrev(' + idx + ')">Prev</button>' +
                    '<button onclick="markOKAndNext(' + idx + ',\'' + item.id + '\')">OK & Next</button>' +
                    '<button onclick="navNext(' + idx + ')">Next</button>' +
                '</div>' +
            '</div>';

        container.appendChild(card);
    });
}

function toggleCard(id) {
    document.getElementById('card-' + id).classList.toggle('open');
}

function expandAll() {
    document.querySelectorAll('.card:not(.hidden)').forEach(c => c.classList.add('open'));
}

function collapseAll() {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
}

function getVisibleCards() {
    return Array.from(document.querySelectorAll('.card:not(.hidden)'));
}

function navToCard(cards, targetIdx) {
    if (targetIdx >= 0 && targetIdx < cards.length) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
        cards[targetIdx].classList.add('open');
        cards[targetIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

function navPrev(idx) {
    const visible = getVisibleCards();
    const cur = document.querySelectorAll('.card')[idx];
    const ci = visible.indexOf(cur);
    navToCard(visible, ci - 1);
}

function navNext(idx) {
    const visible = getVisibleCards();
    const cur = document.querySelectorAll('.card')[idx];
    const ci = visible.indexOf(cur);
    navToCard(visible, ci + 1);
}

function markOKAndNext(idx, id) {
    if (!verdicts[id]) setVerdict(id, 'OK');
    navNext(idx);
}

function applyFilters() {
    const catFilter = document.getElementById('filterCat').value;
    const statusFilter = document.getElementById('filterStatus').value;

    document.querySelectorAll('.card').forEach(card => {
        const cat = card.getAttribute('data-cat');
        const id = card.getAttribute('data-id');
        const isFail = card.classList.contains('fail');
        const isReviewed = !!verdicts[id];
        const verdict = verdicts[id] || '';

        let show = true;
        if (catFilter !== 'all' && cat !== catFilter) show = false;
        if (statusFilter === 'unreviewed' && isReviewed) show = false;
        if (statusFilter === 'reviewed' && !isReviewed) show = false;
        if (statusFilter === 'fail' && !isFail) show = false;
        if (statusFilter === 'flagged' && (!isReviewed || verdict === 'OK')) show = false;

        card.classList.toggle('hidden', !show);
    });

    document.querySelectorAll('.cat-divider').forEach(div => {
        const cat = div.getAttribute('data-cat');
        if (catFilter !== 'all' && cat !== catFilter) {
            div.classList.add('hidden');
        } else {
            const hasVisible = document.querySelector('.card[data-cat="' + cat + '"]:not(.hidden)');
            div.classList.toggle('hidden', !hasVisible);
        }
    });
}

function exportResults() {
    const reviewer = document.getElementById('reviewerName').value || 'anonymous';
    const vals = Object.values(verdicts);
    const result = {
        reviewer: reviewer,
        model: MODEL,
        date: DATE,
        exported_at: new Date().toISOString(),
        total: ITEMS.length,
        reviewed: Object.keys(verdicts).length,
        summary: {
            ok: vals.filter(v => v === 'OK').length,
            wrong: vals.filter(v => v === 'Wrong action').length,
            missing: vals.filter(v => v === 'Missing action').length,
            unnecessary: vals.filter(v => v === 'Unnecessary action').length,
        },
        items: {},
    };

    ITEMS.forEach(item => {
        result.items[item.id] = {
            cat: item.cat,
            auto_passed: item.passed,
            verdict: verdicts[item.id] || '(not reviewed)',
            comment: comments[item.id] || '',
            prompt: item.prompt,
            actions: item.actions,
        };
    });

    const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'review_' + reviewer + '_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Exported ' + Object.keys(verdicts).length + ' verdicts');
}

function clearAll() {
    if (!confirm('Clear ALL verdicts and comments?')) return;
    verdicts = {};
    comments = {};
    saveState();
    buildCards();
    updateProgress();
    showToast('All cleared');
}

// Init
loadState();
buildCards();
updateProgress();
document.getElementById('filterCat').addEventListener('change', applyFilters);
document.getElementById('filterStatus').addEventListener('change', applyFilters);
document.getElementById('reviewerName').addEventListener('change', saveState);

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    const openCard = document.querySelector('.card.open:not(.hidden)');
    if (!openCard) return;
    const id = openCard.getAttribute('data-id');
    const allCards = Array.from(document.querySelectorAll('.card'));
    const idx = allCards.indexOf(openCard);

    if (e.key === '1') { setVerdict(id, 'OK'); e.preventDefault(); }
    if (e.key === '2') { setVerdict(id, 'Wrong action'); e.preventDefault(); }
    if (e.key === '3') { setVerdict(id, 'Missing action'); e.preventDefault(); }
    if (e.key === '4') { setVerdict(id, 'Unnecessary action'); e.preventDefault(); }
    if (e.key === 'ArrowRight' || e.key === 'n') { navNext(idx); e.preventDefault(); }
    if (e.key === 'ArrowLeft' || e.key === 'p') { navPrev(idx); e.preventDefault(); }
    if (e.key === ' ' && !e.shiftKey) { markOKAndNext(idx, id); e.preventDefault(); }
});
</script>
