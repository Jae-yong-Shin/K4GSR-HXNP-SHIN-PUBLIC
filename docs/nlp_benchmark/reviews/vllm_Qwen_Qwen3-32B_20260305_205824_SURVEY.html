<html lang="ko">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e8eaed;
    min-height: 100vh;
}
.header {
    background: #1a1d23;
    border-bottom: 1px solid #2a2d35;
    padding: 16px 24px;

    top: 0;
    z-index: 100;
}
.header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
}
.header h1 {
    font-size: 20px;
    color: #4db8ff;
}
.meta {
    font-size: 13px;
    color: #a0a4ab;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 16px;
}
.progress-bar {
    height: 6px;
    background: #2a2d35;
    border-radius: 3px;
    margin-top: 8px;
}
.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4db8ff, #40d89a);
    border-radius: 3px;
    transition: width 0.3s;
}
.progress-text {
    font-size: 12px;
    color: #a0a4ab;
    margin-top: 4px;
    text-align: right;
}
.toolbar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 8px;
}
.toolbar select, .toolbar button, .reviewer-input {
    background: #22252b;
    color: #e8eaed;
    border: 1px solid #3a3d45;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
}
.toolbar select:focus, .reviewer-input:focus {
    outline: none;
    border-color: #4db8ff;
}
.toolbar button:hover { background: #2a2d35; border-color: #4db8ff; }
.toolbar button.primary {
    background: #4db8ff; color: #0f1117; border-color: #4db8ff; font-weight: 600;
}
.toolbar button.primary:hover { background: #3aa8ef; }
.toolbar button.danger { background: #ff4d4d; color: #fff; border-color: #ff4d4d; }
.reviewer-input { width: 140px; cursor: text; }
.content {
    max-width: 920px;
    margin: 0 auto;
    padding: 20px;
}
.card {
    background: #1a1d23;
    border: 1px solid #2a2d35;
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
}
.card.reviewed { border-color: #40d89a44; }
.card.fail { border-left: 3px solid #ff4d4d; }
.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: #22252b;
    cursor: pointer;
    user-select: none;
}
.card-header:hover { background: #262930; }
.card-id {
    font-weight: 600;
    font-size: 14px;
    color: #4db8ff;
    white-space: nowrap;
}
.card-prompt-preview {
    font-size: 13px;
    color: #a0a4ab;
    margin-left: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
}
.card-badges {

    flex-shrink: 0;

}
.badge {

    white-space: nowrap;
}
.badge.pass { background: #40d89a22; color: #40d89a; }
.badge.fail-badge { background: #ff4d4d22; color: #ff4d4d; }

.badge.verdict-wrong { background: #ff4d4d22; color: #ff4d4d; }
.badge.verdict-missing { background: #ffb34022; color: #ffb340; }
.badge.verdict-unnecessary { background: #a855f722; color: #a855f7; }
.card-body {

    display: none;
}
.card.open .card-body { display: block; }
.field { margin-bottom: 12px; }
.field-label {

    color: #6b7280;
    margin-bottom: 4px;
    font-weight: 600;

}
.field-value {

    line-height: 1.6;
    color: #e8eaed;
    background: #22252b;
    padding: 10px 14px;
    border-radius: 6px;

.field-value.prompt { color: #ffb340; font-weight: 500; font-size: 15px; }
.field-value.actions {

}
.field-value.error { color: #ff4d4d; font-size: 13px; }
.verdict-section {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #2a2d35;
}
.verdict-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
}
.verdict-option {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid #3a3d45;
    transition: all 0.15s;
    font-size: 13px;
}
.verdict-option:hover { background: #22252b; }
.verdict-option input[type="radio"] { accent-color: #4db8ff; }
.verdict-option.selected { border-color: #4db8ff; background: #4db8ff11; }
.comment-input {
    width: 100%;
    background: #22252b;
    border: 1px solid #3a3d45;
    color: #e8eaed;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    min-height: 36px;
}
.comment-input:focus { outline: none; border-color: #4db8ff; }
.cat-divider {
    padding: 20px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
}
.cat-divider h2 { font-size: 16px; color: #4db8ff; white-space: nowrap; }
.cat-divider .line { flex: 1; height: 1px; background: #2a2d35; }
.cat-divider .count { font-size: 12px; color: #6b7280; white-space: nowrap; }
.hidden { display: none !important; }
.nav-buttons {
    display: flex;
    gap: 8px;
    margin-top: 12px;
}
.nav-buttons button {
    flex: 1;
    padding: 8px;
    background: #22252b;
    border: 1px solid #3a3d45;
    color: #e8eaed;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
}
.nav-buttons button:hover { background: #2a2d35; border-color: #4db8ff; }
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #40d89a;
    color: #0f1117;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 1000;
    pointer-events: none;
}
.toast.show { opacity: 1; }
.summary-bar {
    display: flex;
    gap: 16px;
    margin-top: 6px;
    font-size: 12px;
    color: #6b7280;
}
.summary-bar .s-ok { color: #40d89a; }
.summary-bar .s-wrong { color: #ff4d4d; }
.summary-bar .s-missing { color: #ffb340; }
.summary-bar .s-unnecessary { color: #a855f7; }
</style>

const ITEMS = [{"id": "motor_01", "cat": "motor", "passed": true, "prompt": "에너지를 12 keV로 설정해", "actions": "setTargetEnergy(12)", "explanation": "빔 에너지를 12 keV로 설정합니다.", "confirmation": true, "elapsed": 26.5, "errors": ""}, {"id": "motor_02", "cat": "motor", "passed": true, "prompt": "M1 피치를 2.5로 이동해", "actions": "motorSetUI(m1, m1_pitch, 2.5)", "explanation": "M1 피치를 2.5 mrad로 이동합니다.", "confirmation": true, "elapsed": 5.4, "errors": ""}, {"id": "motor_03", "cat": "motor", "passed": true, "prompt": "시료 X를 100 이동해", "actions": "motorSetUI(sample, sample_cx, 100)", "explanation": "시료 X 위치를 100 µm로 이동합니다.", "confirmation": true, "elapsed": 5.3, "errors": ""}, {"id": "scan_01", "cat": "scan", "passed": true, "prompt": "구리 K-edge XAFS 측정해줘", "actions": "quickXafs(Cu, K) -> queueStart()", "explanation": "Cu K-edge (8.979 keV) XAFS 스캔을 실행합니다. 현재 에너지(10 keV)와 Cu K-edge (8.979 keV)의 차이는 1.021 keV로 2 keV 이하이므로 광학 정렬 없이 바로 측정합니다.", "confirmation": true, "elapsed": 12.6, "errors": ""}, {"id": "scan_02", "cat": "scan", "passed": true, "prompt": "철 XANES 측정해줘", "actions": "quickXanes(Fe, K) -> queueStart()", "explanation": "Fe K-edge (7.112 keV) XANES 스캔을 실행합니다. XAFS보다 세밀한 0.25 eV 분해능으로 흡수단 근처를 스캔합니다. 노출 시간: 0.1초/포인트 기본.", "confirmation": true, "elapsed": 11.3, "errors": ""}, {"id": "scan_03", "cat": "scan", "passed": true, "prompt": "10x10 범위에 41포인트로 철 XRF 2D 맵 측정해줘", "actions": "setTargetEnergy(8.5) -> quickRaster(10, 10, 41) -> queueStart()", "explanation": "Fe K-edge (7.112 keV) 위의 8.5 keV로 설정 후, 10×10 µm 범위에서 41×41 포인트 XRF 래스터 스캔을 실행합니다. 노출 시간: 0.1초/포인트 기본. 변경이 필요하시면 말씀해 주세요.", "confirmation": true, "elapsed": 15.0, "errors": ""}, {"id": "scan_04", "cat": "scan", "passed": true, "prompt": "시료를 (0,0)에서 (10,5)까지 라인스캔해줘", "actions": "quickLineScan(0, 0, 10, 5, 51) -> queueStart()", "explanation": "시료 (0,0)→(10,5) µm 대각선 라인스캔 (51포인트)을 실행합니다.", "confirmation": true, "elapsed": 8.8, "errors": ""}, {"id": "scan_05", "cat": "scan", "passed": true, "prompt": "M1 피치를 1~4 mrad에서 고속스캔해줘 ation": false, "elapsed": 10.6, "errors": ""}, {"id": "sigest_05", "cat": "signal_est", "passed": true, "prompt": "Pt L3 XRF를 할건데 Ir 간섭이 있을까?", "actions": "(empty)", "explanation": "Pt L3-edge (11.564 keV) XRF를 실행하시려면 '실행해줘'라고 말씀해 주세요. Ir K-edge는 14.1 keV로, 이 에너지에서 Ir 형광선이 여기되지 않으므로 간섭은 없습니다. Ir L3-edge는 1.7 keV로 매우 낮아 측정되지 않습니다. 따라서 Pt L3 XRF에서는 Ir 간섭이 없습니다. ⚠ 주의: 현재 미러 코팅이 Pt인 경우, Pt 형광선과 간섭이 발생할 수 있습니다. Rh 코팅 stripe으로 변경하시는 것을 권장합니다.", "confirmation": false, "elapsed": 33.0, "errors": ""}, {"id": "blknow_01", "cat": "bl_knowledge", "passed": true, "prompt": "이 빔라인 에너지 범위가 어떻게 돼?", "actions": "(empty)", "explanation": "이 빔라인의 에너지 범위는 5.0 keV에서 25.0 keV입니다. 예를 들어, 인(P) K-edge는 2.145 keV로 이 범위 밖에 있어 측정할 수 없습니다. 5.0 keV 이상의 에너지를 가진 원소의 K-edge나 L3-edge를 측정할 수 있습니다.", "confirmation": false, "elapsed": 24.7, "errors": ""}, {"id": "blknow_02", "cat": "bl_knowledge", "passed": true, "prompt": "KB 미러 초점 거리가 얼마야?", "actions": "(empty)", "explanation": "KB 미러의 초점 거리는 에너지에 따라 달라지며, 이 빔라인에서는 에너지에 따라 자동으로 초점이 맞춰집니다. 현재 에너지가 10 keV일 때, KB 미러의 수직 초점 거리는 약 10.5 m, 수평 초점 거리는 약 11.2 m입니다. 이 초점 거리는 빔라인의 광학 설계에 따라 고정되어 있으며, 사용자가 직접 조정할 수 없습니다.", "confirmation": false, "elapsed": 29.1, "errors": ""}, {"id": "blknow_03", "cat": "bl_knowledge", "passed": true, "prompt": "DCM Si(111)이랑 Si(311) 차이가 뭐야?", "actions": "(empty)", "explanation": "Si(111)과 Si(311)은 결정면의 차이입니다. Si(111)은 저에너지 영역(1.839 keV)의 K-edge를 가지므로 이 빔라인(5~25 keV)에서는 사용할 수 없습니다. Si(311)은 고에너지 영역의 K-edge를 가지므로 사용할 수 있습니다. Si(311)은 고에너지 측정에 적합한 결정면입니다.", "confirmation": false, "elapsed": 31.4, "errors": ""}, {"id": "blknow_04", "cat": "bl_knowledge", "passed": true, "prompt": "이 빔라인에서 할 수 있는 실험 종류를 알려줘", "actions": "(empty)", "explanation": "이 빔라인에서 가능한 실험 기법은 다음과 같습니다:  1. **XAFS(X-ray Absorption Fine Structure)**    - XANES(흡수단 근처 고해상도) 및 EXAFS(흡수단 이후 구조 분석)    - 예: Fe K-edge XAFS, Co K-edge XANES  2. **XRF Imaging(X-ray Fluorescence Mapping)**    - 2D 래스터 스캔으로 원소 분포 이미징    - 예: Cu, Ni, Zn 등의 분포 측정  3. **Powder XRD(X-ray Diffraction)*...", "confirmation": false, "elapsed": 201.9, "errors": ""}, {"id": "blknow_05", "cat": "bl_knowledge", "passed": true, "prompt": "빔 사이즈가 최소 얼마까지 줄어들어?", "actions": "(empty)", "explanation": "빔 사이즈는 광학 설정에 따라 달라집니다. 현재 KB 미러 집속 모드에서 최소 빔 사이즈는 약 50 nm 수준입니다. SSA 갭을 줄이면 빔의 결맞음도(coherence)가 향상되어 더 작은 사이즈가 가능하지만, 이는 빔 강도를 감소시킵니다. 최소 빔 사이즈를 얻기 위해 KB 집속 모드와 좁은 SSA 갭을 사용하는 것이 좋습니다.", "confirmation": false, "elapsed": 29.0, "errors": ""}, {"id": "ssa_01", "cat": "ssa_control", "passed": true, "prompt": "SSA 수직갭을 60um으로 맞춰줘", "actions": "motorSetUI(ssa, ssa_vgap, 60)", "explanation": "SSA 수직 갭을 60 um으로 설정합니다.", "confirmation": true, "elapsed": 5.1, "errors": ""}, {"id": "ssa_02", "cat": "ssa_control", "passed": true, "prompt": "SSA를 최소로 닫아줘. 수평 수직 다 10um으로.", "actions": "motorSetUI(ssa, ssa_hgap, 10) -> motorSetUI(ssa, ssa_vgap, 10)", "explanation": "SSA 수평/수직 갭을 각각 10 um으로 설정합니다.", "confirmation": true, "elapsed": 7.7, "errors": ""}, {"id": "ssa_03", "cat": "ssa_control", "passed": true, "prompt": "SSA 크기 좀 키워줘. 수평 100 수직 80", "actions": "motorSetUI(ssa, ssa_hgap, 100) -> motorSetUI(ssa, ssa_vgap, 80)", "explanation": "SSA 수평 갭을 100 um, 수직 갭을 80 um로 설정합니다. 현재 에너지(10 keV)에서 이 설정은 빔 크기를 증가시키며, 이로 인해 빔의 결맞음도가 감소할 수 있습니다. 정렬이 필요한 경우 별도로 요청해 주세요.", "confirmation": true, "elapsed": 14.9, "errors": ""}, {"id": "analysis_01", "cat": "analysis_intent", "passed": true, "prompt": "이 시료의 Fe 산화 상태를 확인하고 싶어요", "actions": "quickXanes(Fe, K) -> queueStart()", "explanation": "Fe K-edge (7.112 keV) XANES로 산화 상태를 분석합니다. XANES는 흡수단 근처의 구조를 세밀하게 측정하여 Fe²⁺, Fe³⁺ 등을 구분할 수 있습니다.", "confirmation": true, "elapsed": 11.0, "errors": ""}, {"id": "analysis_02", "cat": "analysis_intent", "passed": true, "prompt": "Cr(III)인지 Cr(VI)인지 확인해야 합니다", "actions": "quickXanes(Cr, K) -> queueStart()", "explanation": "Cr K-edge (5.989 keV) XANES로 Cr의 산화 상태를 분석합니다. Cr(III)와 Cr(VI)는 near-edge 구조가 다르므로 XANES로 구분할 수 있습니다.", "confirmation": true, "elapsed": 9.9, "errors": ""}, {"id": "analysis_03", "cat": "anal const MODEL = 'Qwen/Qwen3-32B';
const DATE = '2026-03-05';
const STORAGE_KEY = 'nlp_review_' + DATE + '_' + MODEL.replace(/[^a-zA-Z0-9]/g,'_');

let verdicts = {};
let comments = {};

function loadState() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const s = JSON.parse(saved);
            verdicts = s.verdicts || {};
            comments = s.comments || {};
            if (s.reviewer) document.getElementById('reviewerName').value = s.reviewer;
        }
    } catch(e) {}
}

function saveState() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            verdicts, comments,
            reviewer: document.getElementById('reviewerName').value
        }));
    } catch(e) {}
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function updateProgress() {
    const total = ITEMS.length;
    const done = Object.keys(verdicts).length;
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent =
        done + ' / ' + total + ' reviewed (' + pct + '%)';

    const vals = Object.values(verdicts);
    const ok = vals.filter(v => v === 'OK').length;
    const wrong = vals.filter(v => v === 'Wrong action').length;
    const missing = vals.filter(v => v === 'Missing action').length;
    const unnecessary = vals.filter(v => v === 'Unnecessary action').length;
    document.getElementById('summaryBar').innerHTML =
        '<span class="s-ok">OK: ' + ok + '</span>' +
        '<span class="s-wrong">Wrong: ' + wrong + '</span>' +
        '<span class="s-missing">Missing: ' + missing + '</span>' +
        '<span class="s-unnecessary">Unnecessary: ' + unnecessary + '</span>';
}

function verdictBadgeClass(v) {
    if (v === 'OK') return 'reviewed-badge';
    if (v === 'Wrong action') return 'verdict-wrong';
    if (v === 'Missing action') return 'verdict-missing';
    if (v === 'Unnecessary action') return 'verdict-unnecessary';
    return 'reviewed-badge';
}

function setVerdict(id, value) {
    verdicts[id] = value;
    saveState();
    updateProgress();
    const card = document.getElementById('card-' + id);
    if (card) {
        card.classList.add('reviewed');
        let badge = card.querySelector('.review-verdict-badge');
        if (badge) {
            badge.textContent = value;
            badge.className = 'badge review-verdict-badge ' + verdictBadgeClass(value);
        } else {
            const badges = card.querySelector('.card-badges');
            const b = document.createElement('span');
            b.className = 'badge review-verdict-badge ' + verdictBadgeClass(value);
            b.textContent = value;
            badges.appendChild(b);
        }
    }
    card.querySelectorAll('.verdict-option').forEach(opt => {
        opt.classList.toggle('selected', opt.querySelector('input').value === value);
    });
    applyFilters();
}

function setComment(id, value) {
    if (value.trim()) comments[id] = value.trim();
    else delete comments[id];
    saveState();
}

function esc(text) {
    if (!text) return '';
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function truncate(s, n) {
    if (!s) return '';
    return s.length > n ? s.substring(0, n) + '...' : s;
}

function buildCards() {
    const container = document.getElementById('content');
    container.innerHTML = '';

    const catSelect = document.getElementById('filterCat');
    // Clear existing options except first
    while (catSelect.options.length > 1) catSelect.remove(1);
    CAT_ORDER.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat + ' (' + CAT_COUNTS[cat] + ')';
        catSelect.appendChild(opt);
    });

    let currentCat = '';
    ITEMS.forEach((item, idx) => {
        if (item.cat !== currentCat) {
            currentCat = item.cat;
            const divider = document.createElement('div');
            divider.className = 'cat-divider';
            divider.setAttribute('data-cat', currentCat);
            divider.innerHTML = '<h2>' + esc(currentCat) + '</h2><div class="line"></div><div class="count">' + CAT_COUNTS[currentCat] + ' tests</div>';
            container.appendChild(divider);
        }

        const card = document.createElement('div');
        card.className = 'card' + (item.passed ? '' : ' fail') + (verdicts[item.id] ? ' reviewed' : '');
        card.id = 'card-' + item.id;
        card.setAttribute('data-cat', item.cat);
        card.setAttribute('data-id', item.id);

        const statusBadge = item.passed
            ? '<span class="badge pass">PASS</span>'
            : '<span class="badge fail-badge">FAIL</span>';
        const timeBadge = '<span class="badge time">' + item.elapsed + 's</span>';
        const sv = verdicts[item.id];
        const reviewBadge = sv
            ? '<span class="badge review-verdict-badge ' + verdictBadgeClass(sv) + '">' + esc(sv) + '</span>'
            : '';

        let errorsHtml = '';
        if (item.errors) {
            errorsHtml = '<div class="field"><div class="field-label">Errors</div><div class="field-value error">' + esc(item.errors) + '</div></div>';
        }

        let confirmHtml = '';
        if (item.confirmation !== null && item.confirmation !== undefined) {
            confirmHtml = '<div class="field"><div class="field-label">Confirmation Required</div><div class="field-value">' + (item.confirmation ? 'Yes' : 'No') + '</div></div>';
        }

        const savedComment = comments[item.id] || '';
        const savedVerdict = verdicts[item.id] || '';
        const previewText = truncate(item.prompt, 50);

        const verdictChoices = ['OK', 'Wrong action', 'Missing action', 'Unnecessary action'];

        card.innerHTML =
            '<div class="card-header" onclick="toggleCard(\'' + item.id + '\')">' +
                '<span class="card-id">#' + (idx+1) + ' ' + esc(item.id) + '</span>' +
                '<span class="card-prompt-preview">' + esc(previewText) + '</span>' +
                '<div class="card-badges">' + statusBadge + timeBadge + reviewBadge + '</div>' +
            '</div>' +
            '<div class="card-body">' +
                '<div class="field"><div class="field-label">User Prompt</div><div class="field-value prompt">' + esc(item.prompt) + '</div></div>' +
                '<div class="field"><div class="field-label">Model Actions</div><div class="field-value actions">' + esc(item.actions) + '</div></div>' +
                confirmHtml +
                '<div class="field"><div class="field-label">Model Explanation</div><div class="field-value">' + esc(item.explanation) + '</div></div>' +
                errorsHtml +
                '<div class="verdict-section">' +
                    '<div class="field-label">Your Verdict</div>' +
                    '<div class="verdict-options">' +
                        verdictChoices.map(function(v) {
                            return '<label class="verdict-option ' + (savedVerdict === v ? 'selected' : '') + '">' +
                                '<input type="radio" name="verdict-' + item.id + '" value="' + v + '"' +
                                (savedVerdict === v ? ' checked' : '') +
                                ' onchange="setVerdict(\'' + item.id + '\', \'' + v + '\')">' +
                                v + '</label>';
                        }).join('') +
                    '</div>' +
                    '<textarea class="comment-input" placeholder="Comment (optional, e.g. suggested correct action)..."' +
                    ' onchange="setComment(\'' + item.id + '\', this.value)">' + esc(savedComment) + '</textarea>' +
                '</div>' +
                '<div class="nav-buttons">' +
                    '<button onclick="navPrev(' + idx + ')">Prev</button>' +
                    '<button onclick="markOKAndNext(' + idx + ',\'' + item.id + '\')">OK & Next</button>' +
                    '<button onclick="navNext(' + idx + ')">Next</button>' +
                '</div>' +
            '</div>';

        container.appendChild(card);
    });
}

function toggleCard(id) {
    document.getElementById('card-' + id).classList.toggle('open');
}

function expandAll() {
    document.querySelectorAll('.card:not(.hidden)').forEach(c => c.classList.add('open'));
}

function collapseAll() {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
}

function getVisibleCards() {
    return Array.from(document.querySelectorAll('.card:not(.hidden)'));
}

function navToCard(cards, targetIdx) {
    if (targetIdx >= 0 && targetIdx < cards.length) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
        cards[targetIdx].classList.add('open');
        cards[targetIdx].scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

function navPrev(idx) {
    const visible = getVisibleCards();
    const cur = document.querySelectorAll('.card')[idx];
    const ci = visible.indexOf(cur);
    navToCard(visible, ci - 1);
}

function navNext(idx) {
    const visible = getVisibleCards();
    const cur = document.querySelectorAll('.card')[idx];
    const ci = visible.indexOf(cur);
    navToCard(visible, ci + 1);
}

function markOKAndNext(idx, id) {
    if (!verdicts[id]) setVerdict(id, 'OK');
    navNext(idx);
}

function applyFilters() {
    const catFilter = document.getElementById('filterCat').value;
    const statusFilter = document.getElementById('filterStatus').value;

    document.querySelectorAll('.card').forEach(card => {
        const cat = card.getAttribute('data-cat');
        const id = card.getAttribute('data-id');
        const isFail = card.classList.contains('fail');
        const isReviewed = !!verdicts[id];
        const verdict = verdicts[id] || '';

        let show = true;
        if (catFilter !== 'all' && cat !== catFilter) show = false;
        if (statusFilter === 'unreviewed' && isReviewed) show = false;
        if (statusFilter === 'reviewed' && !isReviewed) show = false;
        if (statusFilter === 'fail' && !isFail) show = false;
        if (statusFilter === 'flagged' && (!isReviewed || verdict === 'OK')) show = false;

        card.classList.toggle('hidden', !show);
    });

    document.querySelectorAll('.cat-divider').forEach(div => {
        const cat = div.getAttribute('data-cat');
        if (catFilter !== 'all' && cat !== catFilter) {
            div.classList.add('hidden');
        } else {
            const hasVisible = document.querySelector('.card[data-cat="' + cat + '"]:not(.hidden)');
            div.classList.toggle('hidden', !hasVisible);
        }
    });
}

function exportResults() {
    const reviewer = document.getElementById('reviewerName').value || 'anonymous';
    const vals = Object.values(verdicts);
    const result = {
        reviewer: reviewer,
        model: MODEL,
        date: DATE,
        exported_at: new Date().toISOString(),
        total: ITEMS.length,
        reviewed: Object.keys(verdicts).length,
        summary: {
            ok: vals.filter(v => v === 'OK').length,
            wrong: vals.filter(v => v === 'Wrong action').length,
            missing: vals.filter(v => v === 'Missing action').length,
            unnecessary: vals.filter(v => v === 'Unnecessary action').length,
        },
        items: {},
    };

    ITEMS.forEach(item => {
        result.items[item.id] = {
            cat: item.cat,
            auto_passed: item.passed,
            verdict: verdicts[item.id] || '(not reviewed)',
            comment: comments[item.id] || '',
            prompt: item.prompt,
            actions: item.actions,
        };
    });

    const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'review_' + reviewer + '_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Exported ' + Object.keys(verdicts).length + ' verdicts');
}

function clearAll() {
    if (!confirm('Clear ALL verdicts and comments?')) return;
    verdicts = {};
    comments = {};
    saveState();
    buildCards();
    updateProgress();
    showToast('All cleared');
}

// Init
loadState();
buildCards();
updateProgress();
document.getElementById('filterCat').addEventListener('change', applyFilters);
document.getElementById('filterStatus').addEventListener('change', applyFilters);
document.getElementById('reviewerName').addEventListener('change', saveState);

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    const openCard = document.querySelector('.card.open:not(.hidden)');
    if (!openCard) return;
    const id = openCard.getAttribute('data-id');
    const allCards = Array.from(document.querySelectorAll('.card'));
    const idx = allCards.indexOf(openCard);

    if (e.key === '1') { setVerdict(id, 'OK'); e.preventDefault(); }
    if (e.key === '2') { setVerdict(id, 'Wrong action'); e.preventDefault(); }
    if (e.key === '3') { setVerdict(id, 'Missing action'); e.preventDefault(); }
    if (e.key === '4') { setVerdict(id, 'Unnecessary action'); e.preventDefault(); }
    if (e.key === 'ArrowRight' || e.key === 'n') { navNext(idx); e.preventDefault(); }
    if (e.key === 'ArrowLeft' || e.key === 'p') { navPrev(idx); e.preventDefault(); }
    if (e.key === ' ' && !e.shiftKey) { markOKAndNext(idx, id); e.preventDefault(); }
});
</script>
</body>
